name: ci

# PRD §F-018: triggered on push to any branch and on pull request. The full
# matrix is `lint` / `test` / `build-linux` / `build-android`. The Android job
# lands once the Tauri Android scaffold is generated (Session 003+, F-001
# completion plus NDK provisioning); until then build-android is omitted so
# the green badge actually means something.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: lint (cargo fmt + clippy + frontend lint + typecheck)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain from rust-toolchain.toml
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri 2 Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2t64 \
            patchelf \
            squashfs-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: frontend lint
        working-directory: frontend
        run: npm run lint

      - name: frontend typecheck
        working-directory: frontend
        run: npm run typecheck

  test:
    name: test (cargo test + vitest)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain from rust-toolchain.toml
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Tauri 2 Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2t64 \
            patchelf \
            squashfs-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: frontend test
        working-directory: frontend
        run: npm test

  build-linux:
    name: build-linux (cargo tauri build)
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain from rust-toolchain.toml
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri 2 Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libfuse2t64 \
            patchelf \
            squashfs-tools

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-linux-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-linux-
            ${{ runner.os }}-cargo-

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: cargo tauri build
        run: cargo tauri build --target x86_64-unknown-linux-gnu

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kino-linux-x86_64-debug-build
          path: |
            target/x86_64-unknown-linux-gnu/release/kino-app
            target/x86_64-unknown-linux-gnu/release/bundle/**/*
          if-no-files-found: warn

  build-android:
    name: build-android (cargo tauri android build --apk)
    runs-on: ubuntu-24.04
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain from rust-toolchain.toml
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # PRD §F-018 Android build parameters: NDK 27.x. The android-actions
      # setup pulls the platform-tools + cmdline-tools, and we install the
      # exact platforms/build-tools/NDK pin separately so the version is
      # explicit in this file rather than implicit in the action's defaults.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973 platform-tools"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            src-tauri/gen/android/app/build
            src-tauri/gen/android/.gradle
          key: ${{ runner.os }}-cargo-build-android-${{ hashFiles('**/Cargo.toml', 'rust-toolchain.toml', 'src-tauri/gen/android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-android-
            ${{ runner.os }}-cargo-

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: cargo tauri android build (universal APK, signed with committed keystore)
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: cargo tauri android build --apk
        working-directory: src-tauri

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: kino-android-universal-debug-build
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          if-no-files-found: warn
