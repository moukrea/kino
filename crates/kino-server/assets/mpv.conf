# PRD §F-015 Linux mpv configuration.
#
# Locked by the PRD; do not deviate without a documented PRD revision.
# The Linux player driver (`kino-player::MpvBuilder`) passes this file
# via `--include=<path>` when the asset is shipped alongside the
# Tauri build. Test environments without the asset still get
# PRD-compliant behaviour because the driver applies the same set as
# command-line flags.
#
# Reference: `man mpv` / https://mpv.io/manual/master/

profile=high-quality
hwdec=auto-safe
keep-open=yes
cache=yes
demuxer-max-bytes=200M
demuxer-readahead-secs=20
audio-spdif=ac3,dts,eac3,truehd,dts-hd
sub-auto=fuzzy
sub-ass=yes
